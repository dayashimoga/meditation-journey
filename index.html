    <meta name="keywords" content="QuickUtils, meditation, journey, code, design, productivity, online tools">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://quickutils.top/meditation-journey/">
    <meta property="og:title" content="Meditation Journey | QuickUtils">
    <meta property="og:description" content="Guided breathing exercises with visual animations and session tracking.">
    <meta property="og:url" content="https://quickutils.top/meditation-journey/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="description" content="Guided breathing exercises with visual animations and session tracking.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧘</text></svg>">
    <link rel="stylesheet" href="quickutils-core.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="grid-bg">
    <nav class="navbar glass-nav"><div class="container nav-inner">
        <a href="https://quickutils.top" class="brand holo-text">🧘 Meditation Journey</a>
        <div class="nav-links">
            <a href="https://ko-fi.com/dayatin" target="_blank" class="kofi-link">☕ Support</a>
            <button id="themeBtn" class="theme-btn">🌙</button>
        </div>
    </div></nav>
    <main class="container py-4">
        <div class="hero-section text-center mb-4"><h1 class="gradient-text">Meditation Journey</h1><p class="text-muted">Find your calm with guided breathing</p></div>
    <div class="glass-card p-4 text-center mb-4">
        <div id="breathText" style="font-size:2rem;font-weight:700;color:var(--clr-primary,#6366f1);margin-bottom:1rem;">Press Start</div>
        <canvas id="medCanvas" width="500" height="400" style="width:100%;max-width:500px;background:#000;border-radius:16px;display:block;margin:0 auto;"></canvas>
        <div class="d-flex gap-2 justify-content-center mt-3">
            <button class="btn btn-primary" id="startMed">▶ Start Session</button>
            <select class="btn btn-secondary" id="breathMode"><option value="478">4-7-8 Relaxing</option><option value="box">Box Breathing</option><option value="calm">Calm 5-5</option></select>
        </div>
        <div class="mt-3 text-muted">Sessions: <strong id="sessionCount">0</strong> | Total Minutes: <strong id="totalMins">0</strong></div>
    </div>
    </main>
    <footer class="footer"><div class="container copyright text-center py-4">© 2026 QuickUtils. All rights reserved.</div></footer>
    <script src="quickutils-core.js"></script>
    <script src="script.js"></script>
</body>
